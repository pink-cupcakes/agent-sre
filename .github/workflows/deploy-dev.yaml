name: Dev — Build and Deploy

env:
  ECR_REGISTRY: 258131496527.dkr.ecr.us-west-2.amazonaws.com
  ECR_REPOSITORY: agent-sre

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and push to ECR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      image-tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.2

      - name: Set image tag
        id: tag
        run: |
          TAG="latest"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: arn:aws:iam::258131496527:role/github-deployer
          aws-region: us-west-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076 # v2.0.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349 # v3.7.1

      - name: Build and push
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6.9.0
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  deploy:
    name: Deploy to dev
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: arn:aws:iam::258131496527:role/github-deployer
          aws-region: us-west-2

      - name: Setup ArgoCD CLI
        run: |
          curl -sSL -o argocd-linux-amd64 https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          sudo install -m 555 argocd-linux-amd64 /usr/local/bin/argocd
          rm argocd-linux-amd64

      - name: Sync and restart
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_TOKEN: ${{ secrets.ARGOCD_TOKEN }}
        run: |
          sync_app() {
            if argocd app sync agent-sre-dev \
                --server $ARGOCD_SERVER \
                --auth-token $ARGOCD_TOKEN \
                --grpc-web; then
              echo "✅ Synced agent-sre-dev"
              return 0
            else
              echo "⏳ Sync failed, retrying in 45s..."
              sleep 45
              argocd app sync agent-sre-dev \
                --server $ARGOCD_SERVER \
                --auth-token $ARGOCD_TOKEN \
                --grpc-web || echo "ℹ️ Sync already in progress, continuing"
            fi
          }

          sync_app

          argocd app actions run agent-sre-dev restart \
            --resource-name=agent-sre \
            --kind Deployment \
            --server $ARGOCD_SERVER \
            --auth-token $ARGOCD_TOKEN \
            --grpc-web

          echo "✅ Deploy complete — ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest"
